<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ PREMIUM FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <title>COCO DESIGN | Freelance Web Design, Ecommerce & Digital Marketing</title>

  <meta name="description"
    content="COCO DESIGN offers freelance web design, ecommerce and digital marketing support for small businesses."
  />

  <link rel="icon" type="image/png" href="./favicon.png" />

  <style>
    :root {
      --bg: #f7f4f6;
      --surface: #ffffff;
      --ink: #434866;
      --ink-soft: #6f7690;
      --accent: #8c2a68;
      --accent-soft: #b57ba0;
      --hero-start: #4a5070;
      --hero-end: #8c2a68;
      --line: rgba(67, 72, 102, 0.12);
      --shadow: 0 20px 60px rgba(67, 72, 102, 0.12);
      --radius: 24px;
      --max: 1160px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }

    /* ✨ PREMIUM TYPOGRAPHY */
    h1, h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1 { font-weight: 700; }

    h3 {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    p { font-weight: 400; }

    .lead {
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .nav-links a { font-weight: 500; }

    .btn {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    img { max-width: 100%; display: block; }

    a { color: var(--accent); text-decoration: none; }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(247, 244, 246, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .hero {
      padding: 42px 0 28px;
    }

    .hero-card {
      background: linear-gradient(135deg, var(--hero-start), var(--hero-end));
      color: white;
      border-radius: 34px;
      padding: 34px;
    }

    .hero h1 {
      font-size: clamp(2.7rem, 5vw, 5.2rem);
      line-height: 0.95;
    }

    .btn-primary {
      background: white;
      color: var(--ink);
      border-radius: 999px;
      padding: 14px 22px;
    }

    .btn-secondary {
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      padding: 14px 22px;
    }

    .section-card {
      background: white;
      border-radius: 24px;
      padding: 36px;
      margin-top: 30px;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin-top: 28px;
    }

    .portfolio-item {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
    }

    .portfolio-item img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .portfolio-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      color: white;
      opacity: 0;
      transition: 0.3s;
    }

    .portfolio-item:hover .portfolio-overlay {
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--ink-soft);
    }

    @media (max-width: 980px) {
      .portfolio-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<nav class="nav">
  <div class="container nav-inner">
    <div class="brand">
      <div class="brand-mark">
        <img src="./badge.png">
      </div>
      COCO DESIGN
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <div class="hero-card">
      <h1>Beautiful websites that feel elevated and work hard for your business.</h1>
      <p>Freelance web design, ecommerce and digital marketing support.</p>

      <div style="margin-top:20px;">
        <a class="btn-primary" href="#contact">Start your project</a>
        <a class="btn-secondary" href="#services">View services</a>
      </div>
    </div>
  </div>
</section>

<section id="portfolio">
  <div class="container">
    <div class="section-card">
      <h2>Recent work</h2>

      <div class="portfolio-grid">

        <div class="portfolio-item">
          <img src="./project1.png">
          <div class="portfolio-overlay">
            <h3>KIS Coffee</h3>
          </div>
        </div>

        <div class="portfolio-item">
          <img src="./project3.png">
          <div class="portfolio-overlay">
            <h3>Two Guys Coffee</h3>
          </div>
        </div>

        <div class="portfolio-item">
          <img src="./project4.png">
          <div class="portfolio-overlay">
            <h3>Blockbusters</h3>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<section id="contact">
  <div class="container">
    <div class="section-card">
      <h2>Contact</h2>
      <p>Email: <a href="mailto:info@cocowebdesign.co.uk">info@cocowebdesign.co.uk</a></p>
    </div>
  </div>
</section>

<footer>
  © COCO DESIGN
</footer>

</body>
</html>
